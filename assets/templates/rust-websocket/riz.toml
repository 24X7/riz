[server]
port = 3000
host = "127.0.0.1"

[function.chat]
runtime  = "rust"
protocol = "websocket"
# Point at the release binary. Build it first:
#   cargo build --release
handler  = "./target/release/chat"
timeout_ms = 5000
concurrency = 4

# WebSocket functions take a single route — the path the WS client
# connects to. The $connect / $default / $disconnect lifecycle is
# handled inside the function, not as separate route entries.
[[function.chat.routes]]
path = "/chat"
