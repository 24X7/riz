name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The hosted runner ships ~14 GB free; a full riz debug build + test
      # binaries + the cargo cache overflow it intermittently ("No space left
      # on device" killed two runs on 2026-07-02/03). Drop the preinstalled
      # toolchains we never use (~30 GB reclaimed, runs in seconds).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
            /usr/local/share/powershell /usr/lib/jvm || true
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Power of 10 safety gate (docs/SAFETY.md): zero-tolerance lints over
      # production code only (--lib --bins). These are rules test helpers
      # legitimately break (panic-as-assertion), so they can't be denied
      # workspace-wide in [workspace.lints] — this step scopes them to the
      # code that ships in the riz binary.
      - name: safety gate (Power of 10)
        run: ./scripts/safety-check.sh --gate

      - name: cargo build
        run: cargo build --workspace

      # The flagship WASM proofs (resource broker e2e, guard e2e, echo
      # cross-runtime leg) skip when their wasm32-wasip1 artifacts are
      # missing — build them HERE so the claims actually run in CI instead
      # of passing by skip.
      - name: Build WASM fixtures (broker / guard / echo / orders guests)
        run: |
          cargo build --release --target wasm32-wasip1 --manifest-path tests/fixtures/broker-wasm/Cargo.toml
          cargo build --release --target wasm32-wasip1 --manifest-path tests/fixtures/guard-wasm/Cargo.toml
          cargo build --release --target wasm32-wasip1 --manifest-path tests/fixtures/parity/echo-wasm/Cargo.toml
          cargo build --release --target wasm32-wasip1 --manifest-path examples/lambdas/orders-wasm/Cargo.toml

      # Build the stock aws-lambda-go echo fixture so the Go runtime-parity leg
      # runs in CI (proves an UNMODIFIED official Go binary works via the AWS
      # Lambda Runtime API) instead of passing by skip.
      - name: Build echo-go fixture
        run: (cd tests/fixtures/parity/echo-go && go build -o echo-go .)

      # Build the official-runtime Rust example handlers (release, the paths
      # examples/riz.all.toml references). This makes the Rust runtime-parity
      # legs AND the end-to-end smoke harness (tests/e2e_smoke_all.rs) run for
      # real in CI instead of passing by skip when target/release is empty.
      - name: Build release example handlers (echo-rust / chat-rust)
        run: cargo build --release -p echo-rust -p chat-rust

      # nextest, never `cargo test` — process-per-test isolation plus the
      # leak signal (a child process outliving its test fails the run).
      #
      # The full suite EXCEPT the end-to-end smoke harness. The harness boots the
      # whole example fleet (~46 worker processes across six runtimes) and holds
      # it for the test's duration; run concurrently with the rest of the suite
      # that starves the 2-vCPU/7GB GitHub runner — workers get killed mid-invoke
      # ("Broken pipe" 502s) in the harness AND in unrelated process-spawning
      # tests. So the harness runs in its own step below, with the runner to
      # itself. Both steps are in this gating job, so either failing fails CI.
      - name: cargo nextest run (unit + integration, excl. e2e fleet)
        # --no-fail-fast: surface every failure in one run, not just the first.
        run: cargo nextest run --workspace --no-fail-fast -E 'not binary(e2e_smoke_all) and not binary(template_smoke_all) and not binary(perf_regression) and not binary(chaos)'

      # The end-to-end smoke harness, isolated so the full example fleet has the
      # whole runner. Boots the real riz binary against examples/riz.all.toml and
      # asserts every example × every runtime works together (see
      # examples/smoke-all.sh + tests/e2e_smoke_all.rs).
      - name: cargo nextest run (e2e smoke — full example fleet, isolated)
        run: cargo nextest run --test e2e_smoke_all

      # The scaffold-boot smoke: `riz new` every one of the six templates,
      # build the compiled legs, boot riz run, assert an APIGW v2 roundtrip
      # (tests/template_smoke_all.rs). Isolated for the same reason as above.
      - name: cargo nextest run (template smoke — scaffold + boot all six, isolated)
        run: cargo nextest run --test template_smoke_all

      # Performance floor + trend, scoped to the built binary. Machine-portable
      # asserts (floor + tail ratios) always run; the tight baseline band is
      # opt-in via RIZ_PERF_GATE so a noisy runner never flakes.
      - name: cargo nextest run (perf regression — floor + trend, isolated)
        run: cargo nextest run --test perf_regression --no-capture

      # Deliberate fault injection (saturation, worker crash, breaker, broker
      # loss, SIGTERM drain, no orphans). Isolated so chaos never flakes the
      # main suite.
      - name: cargo nextest run (chaos — fault injection, isolated)
        # Cap parallelism: 6 fault-injection tests each boot a riz fleet;
        # a small runner contends and times out otherwise.
        run: cargo nextest run --test chaos --test-threads 2

  # Supply-chain gate (deny.toml): RUSTSEC advisories, an SPDX license
  # allowlist, banned/wildcard crates, and registry provenance. Advisories are
  # live, so this can start failing on a newly-published CVE even with no code
  # change — that's the point. Fix = bump the dep, or add a dated, documented
  # exception to deny.toml [advisories].ignore.
  cargo-deny:
    name: cargo-deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # CycloneDX Software Bill of Materials for the workspace. Published as a
  # build artifact every run (riz*.cdx.json) so a consumer can diff the exact
  # dependency set that produced a build.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error
