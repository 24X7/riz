name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      # nextest, never `cargo test` — process-per-test isolation plus the
      # leak signal (a child process outliving its test fails the run).
      - name: cargo nextest run
        run: cargo nextest run --workspace

  acceptance-future:
    name: Future-wave acceptance (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - name: Run #[ignore]-gated wave acceptance tests
        run: cargo nextest run --workspace --run-ignored ignored-only
