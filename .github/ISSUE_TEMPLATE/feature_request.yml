name: Feature request
description: Suggest an idea or improvement for riz
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        riz is deliberately scoped to **AWS HTTP API Gateway v2 + WebSocket**
        Lambdas and the agent/AI substrate around them. Non-HTTP event sources
        (SQS/SNS/S3/EventBridge/etc.) are out of scope by design.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like riz to do? Config/CLI/API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is about HTTP/WebSocket Lambdas or the agent/AI surface (not a non-HTTP AWS event source).
          required: true
