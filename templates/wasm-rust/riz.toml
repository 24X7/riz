[server]
port = 3000
host = "127.0.0.1"

[function.hello]
runtime = "wasm"
# Point at the wasm32-wasip1 module. Build it first:
#   rustup target add wasm32-wasip1
#   cargo build --release --target wasm32-wasip1
handler = "./target/wasm32-wasip1/release/hello.wasm"
timeout_ms = 5000
concurrency = 2

# WASM runs deny-by-default under wasmtime + WASI: stdio only, no filesystem,
# network, or host env. Grant filesystem access with `allowed_paths`, guest env
# with `[function.hello.stage_variables]`, and brokered resources with
# capability grants. The guest names a grant, never a secret — credentials
# stay host-side. Uncomment to give this function a Postgres grant:
#
# [resources.pg.main]
# dsn_env = "RIZ_PG_MAIN_DSN"          # credential lives in the HOST env only
#
# [function.hello.capabilities.db]
# type = "pg"
# resource = "pg.main"
# mode = "read-only"
# max_inflight = 2
#
# Then in the handler: riz_wasm::cap::pg::query("db", "select 1 as one", &[])

[[function.hello.routes]]
path = "/hello"
method = "GET"
