# Benchmark scenario: single bun handler at concurrency=20 (one process pool,
# 20 in-flight slots). Mirrors a realistic prod sizing for a small endpoint.
# Run with: ./target/release/riz --log-level warn --config benches/bench-config.toml run
[server]
port = 3000
host = "127.0.0.1"

[cache]
default_ttl_secs = 0
max_size_mb = 16

[datadog]
enabled = false

[function.ping]
runtime = "bun"
handler = "./examples/lambdas/ping/index.handler"
timeout_ms = 1000
concurrency = 20
