[package]
name = "osbox"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "osbox"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["macros"] }
clap = { version = "4", features = ["derive"] }
ratatui = "0.28"
crossterm = "0.28"
moka = { version = "0.12", features = ["future"] }
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
notify = "6"
aws-sdk-s3 = "1"
aws-config = "1"
zip = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
cadence = "1"
ipnet = "2"
tower-http = { version = "0.5", features = ["trace"] }

[profile.release]
opt-level = 3
lto = "thin"

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"
