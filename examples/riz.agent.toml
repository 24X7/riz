# riz.agent.toml — the agent-substrate demo config.
#
# Three side-effect-light functions, each of which auto-becomes ONE MCP tool
# at `/_riz/mcp` the moment `riz run` boots. The Claude Agent SDK script in
# examples/agent-sdk/ points at that endpoint and lets Claude call these as
# tools (tool name == function name below).
#
#   riz --config examples/riz.agent.toml run
#   → MCP tools: lookup_order, list_inventory, create_ticket
#
# The LLM gateway uses the deterministic `mock` provider so the AI path is
# exercisable in CI without a key. Swap to a real provider for live use.

[server]
port = 3000
host = "127.0.0.1"

[gateway]
default_provider = "mock"
fallback_chain = ["mock"]

[gateway.providers.mock]
kind = "mock"

[function.lookup_order]
runtime = "bun"
handler = "./examples/lambdas/agent-tools/index.lookupOrder"
timeout_ms = 2000
concurrency = 4

[[function.lookup_order.routes]]
path = "/orders/{id}"
method = "GET"

# Typed MCP tool schema (v1 roadmap #13). The {id} path param is typed and
# required automatically from the route template; this block just sharpens
# the description the agent reads on tools/list.
[function.lookup_order.mcp]
description = "Look up an order by id. Returns the item, status (processing/shipped/delivered/delayed), a `delayed` flag, and ETA in days. Try ids 1041-1043; 1042 is delayed."

[function.list_inventory]
runtime = "bun"
handler = "./examples/lambdas/agent-tools/index.listInventory"
timeout_ms = 2000
concurrency = 4

[[function.list_inventory.routes]]
path = "/inventory"
method = "GET"

[function.list_inventory.mcp]
description = "List current inventory: sku, name, and inStock count for every item. Takes no parameters."

[function.create_ticket]
runtime = "bun"
handler = "./examples/lambdas/agent-tools/index.createTicket"
timeout_ms = 2000
concurrency = 4

[[function.create_ticket.routes]]
path = "/tickets"
method = "POST"

# Typed body schema: agents send a JSON object (riz serializes it into the
# Lambda event's string body). Mirrors exactly what the handler reads —
# orderId is required, reason is optional.
[function.create_ticket.mcp]
description = "Open a support ticket for an order. Send orderId (required) and an optional reason; returns the created ticket with its id."

[function.create_ticket.mcp.body]
type = "object"
required = ["orderId"]

[function.create_ticket.mcp.body.properties.orderId]
type = "string"
description = "The order id the ticket is about, e.g. \"1042\""

[function.create_ticket.mcp.body.properties.reason]
type = "string"
description = "Short reason for the ticket"
