# Comprehensive example config — every handler in examples/lambdas/ wired up.
# Run with:
#   ./target/release/riz --log-level info --config examples/riz.all.toml run
# (or:  ./target/release/riz --dev --config examples/riz.all.toml run  for the TUI)
#
# Companion exercise script: examples/smoke-all.sh
#
# Routes:
#   GET  /ping                  → ping (Bun)
#   GET  /accounts/{id}         → accounts (Bun)
#   ANY  /events                → events (Bun)
#   ANY  /accounts              → crud-accounts (Bun)
#   ANY  /accounts/{id}         → crud-accounts (Bun)
#   ANY  /echo-bun              → echo-bun (Bun)
#   ANY  /echo-node             → echo-node (Node.js)
#   ANY  /echo-python           → echo-python (Python)
#   ANY  /echo-rust             → echo-rust (Rust, official lambda_runtime via the Lambda Runtime API)
#   ANY  /echo-go               → echo-go   (Go, official aws-lambda-go via the Lambda Runtime API)
#   ANY  /echo-wasm             → echo-wasm (WASM / wasm32-wasip1, wasmtime sandbox)
#   POST /orders                → orders-wasm (WASM real-compute order pricing)
#   ANY  /protected             → events (Bun) gated by auth-allow-bun authorizer (allows)
#   ANY  /forbidden             → events (Bun) gated by auth-deny-bun  authorizer (denies)
#   WS   /chat                  → chat (Bun)
#   WS   /chat-python           → chat-python (Python)
#   WS   /chat-rust             → chat-rust (Rust)

[server]
port = 3000
host = "127.0.0.1"

[cache]
default_ttl_secs = 0
max_size_mb = 32

# Global CORS — applies to every user function. A per-function
# [function.<name>.cors] block overrides this for that function's routes.
# Demo: an OPTIONS preflight returns 204 with the Access-Control-* headers;
# a real request echoes Access-Control-Allow-Origin for an allowed origin.
[cors]
allow_origins = ["https://app.example.com"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allow_headers = ["content-type", "authorization"]
allow_credentials = true
max_age_secs = 600

# LLM gateway — exposes an OpenAI-compatible endpoint at /_riz/v1. The 'mock'
# provider is deterministic + network-free so the demo needs no API key. To use
# real models, add providers (kind = mock | openai | anthropic | ollama) and a
# fallback_chain, e.g.:
#   [gateway.providers.openai]
#   kind = "openai"
#   api_key_env = "OPENAI_API_KEY"
#   [gateway.providers.anthropic]
#   kind = "anthropic"
#   api_key_env = "ANTHROPIC_API_KEY"
#   [gateway.providers.ollama]      # local; no key
#   kind = "ollama"
# Then route by model prefix (e.g. "anthropic/claude-opus-4-8") or default_provider.
[gateway]
default_provider = "mock"
fallback_chain = ["mock"]

[gateway.providers.mock]
kind = "mock"

# Local Ollama — a REAL model, no API key, fully on-box. The demo sends
# model = "ollama/llama3.2:1b" to route here explicitly; the OpenAI-compatible
# upstream defaults to http://localhost:11434/v1. If Ollama isn't running the
# request transparently falls back to the mock provider (fallback_chain above).
[gateway.providers.ollama]
kind = "ollama"

# ─────────────── Bun HTTP ───────────────

[function.ping]
runtime = "bun"
handler = "./tests/fixtures/ping/index.handler"
timeout_ms = 1000
concurrency = 1

[function.events]
runtime = "bun"
handler = "./examples/lambdas/events/index.handler"
timeout_ms = 1000
concurrency = 1
[[function.events.routes]]
path = "/events"
method = "ANY"

[function.crud-accounts]
runtime = "bun"
handler = "./examples/lambdas/crud-accounts/index.handler"
timeout_ms = 5000
concurrency = 1
# Response caching: GET /accounts/{id} is cached for 30s. The handler stamps
# `servedAt` into the body, so a cache HIT replays the same servedAt; POST
# /cache/invalidate with prefix "GET:/accounts/" evicts it -> fresh servedAt.
cache_ttl_secs = 30
[[function.crud-accounts.routes]]
path = "/accounts"
method = "ANY"
[[function.crud-accounts.routes]]
path = "/accounts/{id}"
method = "ANY"

[function.echo-bun]
runtime = "bun"
handler = "./tests/fixtures/parity/echo-bun/index.handler"
timeout_ms = 5000
concurrency = 1
# Stage variables — surfaced on the event as `stageVariables`, mirroring AWS
# API Gateway per-stage config. The echo handler reflects them in its response.
[function.echo-bun.stage_variables]
region = "us-east-1"
tier = "demo"
[[function.echo-bun.routes]]
path = "/echo-bun"
method = "ANY"

# ─────────────── Node.js HTTP ───────────────

[function.echo-node]
runtime = "node"
handler = "./tests/fixtures/parity/echo-node/index.handler"
timeout_ms = 5000
concurrency = 1
[[function.echo-node.routes]]
path = "/echo-node"
method = "ANY"

# ─────────────── Python HTTP ───────────────

[function.echo-python]
runtime = "python"
handler = "./tests/fixtures/parity/echo-python/main.lambda_handler"
timeout_ms = 5000
concurrency = 1
# On-box safety caps applied to this handler's child process:
#   cpu_time_secs → RLIMIT_CPU (SIGXCPU then SIGKILL on runaway loops)
#   memory_mb     → RLIMIT_AS  (mirrors AWS Lambda MemorySize) — available but
#                   left off here: Bun/Python JITs reserve large virtual address
#                   space, so a low RLIMIT_AS is platform-sensitive. Opt in per host.
#   allowed_paths → Linux Landlock filesystem allowlist (a no-op off Linux). It
#                   is enforced in pre_exec, i.e. BEFORE execve, so the allowlist
#                   must ALSO include the program being run and its shared
#                   libraries (here python3 + /usr, /lib*) or the child can't
#                   exec at all (EACCES). The interpreter path varies per host,
#                   so it's left off this portable demo; per-handler filesystem
#                   isolation is exercised by the dedicated safety tests instead.
#                   (See the riz-bug note in CONTRIBUTING — allowed_paths should
#                   auto-grant the interpreter; until then keep it Linux-aware.)
# (An always-on profile — RLIMIT_CORE=0, fd/file-size caps, PDEATHSIG,
#  NO_NEW_PRIVS — applies to every handler regardless of these opt-ins.)
cpu_time_secs = 10
[[function.echo-python.routes]]
path = "/echo-python"
method = "ANY"

# ─────────────── Rust HTTP ───────────────

[function.echo-rust]
runtime = "rust"
handler = "./target/release/echo-rust"
timeout_ms = 5000
concurrency = 1
[[function.echo-rust.routes]]
path = "/echo-rust"
method = "ANY"

# ─────────────── Go HTTP ───────────────
# A STOCK aws-lambda-go (`lambda.Start`) binary — no riz library. The same
# binary runs unmodified on AWS Lambda and on riz, because riz speaks the AWS
# Lambda Runtime API. Build: cd tests/fixtures/parity/echo-go && go build -o echo-go .

[function.echo-go]
runtime = "go"
handler = "./tests/fixtures/parity/echo-go/echo-go"
timeout_ms = 5000
concurrency = 1
[[function.echo-go.routes]]
path = "/echo-go"
method = "ANY"

# ─────────────── WASM (wasm32-wasip1 under wasmtime) ───────────────
# A capability-sandboxed .wasm handler — same Lambda envelope as every other
# runtime, run by `riz __wasm-host` inside wasmtime's WASI sandbox. Deny-by-
# default: stdio only, no filesystem, no network, no host env. stage_variables
# become the guest's environment. Build: cd tests/fixtures/parity/echo-wasm &&
# cargo build --release --target wasm32-wasip1
#
# allowed_paths would grant WASI preopens to the guest — but it ALSO drives the
# host child's Landlock allowlist (applied in pre_exec, before execve), and on
# Linux that blocks the wasm host from exec'ing the riz binary unless the binary
# is in the list. echo-wasm needs no filesystem, so it's left off and the guest
# runs fully sandboxed (the strongest demo). See riz-bug note in CONTRIBUTING.
[function.echo-wasm]
runtime = "wasm"
handler = "./tests/fixtures/parity/echo-wasm/target/wasm32-wasip1/release/echo-wasm.wasm"
timeout_ms = 5000
concurrency = 1
[function.echo-wasm.stage_variables]
sandbox = "wasi"
[[function.echo-wasm.routes]]
path = "/echo-wasm"
method = "ANY"

# orders-wasm — the REAL-COMPUTE WASM example. Same deny-by-default WASI
# sandbox as echo-wasm, but the handler does actual business logic: it parses an
# order payload (array of line-items), validates every field, and prices the
# order (per-line extended amounts, subtotal, 8.25% tax, grand total) in integer
# cents. Proves a `.wasm` handler runs application logic, not just echo. Build:
# cd examples/lambdas/orders-wasm && cargo build --release --target wasm32-wasip1
[function.orders-wasm]
runtime = "wasm"
handler = "./examples/lambdas/orders-wasm/target/wasm32-wasip1/release/orders-wasm.wasm"
timeout_ms = 5000
concurrency = 1
[function.orders-wasm.stage_variables]
sandbox = "wasi"
[[function.orders-wasm.routes]]
path = "/orders"
method = "POST"

# Capability flagship: uncomment to persist priced orders through the brokered
# Postgres grant. The guest names the grant `db`, never a DSN — credentials
# stay host-side, resolved from RIZ_PG_MAIN_DSN at daemon startup. Without this
# block orders-wasm still prices orders and returns `persisted: false`.
#
# [resources.pg.main]
# dsn_env = "RIZ_PG_MAIN_DSN"
# max_connections = 5
#
# [function.orders-wasm.capabilities.db]
# type = "pg"
# resource = "pg.main"
# mode = "read-write"
# max_inflight = 4

# ─────────────── Authorizers ───────────────
# The two auth handlers below are LIVE functions referenced from other
# functions' `[function.X.authorizer]` blocks. They must be registered as
# functions in their own right so the runtime knows how to spawn them.

[function.auth-allow]
runtime = "bun"
handler = "./examples/lambdas/auth-allow-bun/index.handler"
timeout_ms = 1000
concurrency = 1

[function.auth-deny]
runtime = "bun"
handler = "./examples/lambdas/auth-deny-bun/index.handler"
timeout_ms = 1000
concurrency = 1

# /protected — same handler as /events but gated by auth-allow (always passes)
[function.protected]
runtime = "bun"
handler = "./examples/lambdas/events/index.handler"
timeout_ms = 1000
concurrency = 1
authorizer = "auth-allow"
[[function.protected.routes]]
path = "/protected"
method = "ANY"

# /forbidden — same handler as /events but gated by auth-deny (always 401s)
[function.forbidden]
runtime = "bun"
handler = "./examples/lambdas/events/index.handler"
timeout_ms = 1000
concurrency = 1
authorizer = "auth-deny"
[[function.forbidden.routes]]
path = "/forbidden"
method = "ANY"

# ─────────────── Bun WebSocket ───────────────

[function.chat]
protocol = "websocket"
runtime = "bun"
handler = "./examples/lambdas/chat/index.handler"
timeout_ms = 5000
concurrency = 1
[[function.chat.routes]]
path = "/chat"
method = "ANY"

# ─────────────── Python WebSocket ───────────────

[function.chat-python]
protocol = "websocket"
runtime = "python"
handler = "./tests/fixtures/parity/chat-python/main.lambda_handler"
timeout_ms = 5000
concurrency = 1
[[function.chat-python.routes]]
