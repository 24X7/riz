[server]
port = 3000
host = "0.0.0.0"

[cache]
default_ttl_secs = 0
max_size_mb = 128

# Observability: one OTLP/HTTP-JSON pipeline. Point `endpoint` at your
# collector (otel-collector, ADOT, or a vendor agent) and spans fan out to
# Datadog / CloudWatch-X-Ray from there. Spans carry OTel GenAI token attrs
# (gen_ai.usage.input_tokens / output_tokens) for LLM-gateway calls.
[telemetry]
enabled = true
endpoint = "http://127.0.0.1:4318"

# Admin auth: gates /_riz/metrics, /_riz/registry, and /_riz/mcp behind a
# shared bearer token (constant-time compared). MCP clients send it as an
# Authorization header; `riz mcp inspect --bearer <token>` or
# $RIZ_AUTH_BEARER_TOKEN for the CLI.
# [auth]
# bearer_token = "changeme"   # prefer an env-templated secret in real deploys

[deploy]
# deploy_key = "changeme"   # prefer RIZ_DEPLOY_KEY env var
allowed_cidrs = []

[aws]
region = "us-east-1"

[function.ping]
runtime = "bun"
handler = "./examples/lambdas/ping/index.ts"
timeout_ms = 5000
concurrency = 2

[function.accounts]
runtime = "bun"
handler = "./examples/lambdas/accounts/index.ts"
cache_ttl_secs = 30
timeout_ms = 5000
concurrency = 2

[[function.accounts.routes]]
path = "/accounts/{id}"
method = "GET"

# MCP: {id} is typed + required automatically from the route template; the
# description is what agents read on tools/list.
[function.accounts.mcp]
description = "Fetch an account by id."

[function.events]
runtime = "bun"
handler = "./examples/lambdas/events/index.ts"
timeout_ms = 5000
concurrency = 2

[[function.events.routes]]
path = "/events"
method = "POST"
