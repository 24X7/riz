[server]
port = 3000
host = "0.0.0.0"

[cache]
default_ttl_secs = 0
max_size_mb = 128

[datadog]
enabled = false
statsd_host = "127.0.0.1:8125"
service = "riz"
env = "production"

[deploy]
# deploy_key = "changeme"   # prefer RIZ_DEPLOY_KEY env var
allowed_cidrs = []

[aws]
region = "us-east-1"

[function.ping]
runtime = "bun"
handler = "./examples/lambdas/ping/index.ts"
timeout_ms = 5000
concurrency = 2

[function.accounts]
runtime = "bun"
handler = "./examples/lambdas/accounts/index.ts"
cache_ttl_secs = 30
timeout_ms = 5000
concurrency = 2

[[function.accounts.routes]]
path = "/accounts/{id}"
method = "GET"

[function.events]
runtime = "bun"
handler = "./examples/lambdas/events/index.ts"
timeout_ms = 5000
concurrency = 2

[[function.events.routes]]
path = "/events"
method = "POST"
