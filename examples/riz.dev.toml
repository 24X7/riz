[server]
port = 3000
host = "127.0.0.1"

[cache]
default_ttl_secs = 0
max_size_mb = 128

[datadog]
enabled = false

# Function-centric config matches AWS Lambda + API Gateway v2.
# One function = one process pool. One function can serve N routes,
# including AWS-style {param} captures and {proxy+} greedy wildcards.
#
# Two forms supported: "./path/file.ts" (path) or "./path/file.handler" (AWS file.export, recommended).

[function.ping]
runtime = "bun"
handler = "./examples/lambdas/ping/index.handler"
timeout_ms = 1000
concurrency = 1
# No routes block → implicit default: ANY /ping

[function.accounts]
runtime = "bun"
handler = "./examples/lambdas/accounts/index.handler"
timeout_ms = 1000
concurrency = 1

[[function.accounts.routes]]
path = "/accounts/{id}"
method = "GET"

[function.events]
runtime = "bun"
handler = "./examples/lambdas/events/index.handler"
timeout_ms = 1000
concurrency = 1

[[function.events.routes]]
path = "/events"
method = "POST"

[function.echo-python]
runtime = "python"
handler = "./examples/lambdas/echo-python/main.lambda_handler"
timeout_ms = 5000
concurrency = 1

[[function.echo-python.routes]]
path = "/echo-python"
method = "ANY"

# WebSocket API. The connection upgrade happens at the route path (/chat).
# Handler receives $connect / $default / $disconnect events shaped exactly
# like AWS API Gateway WebSocket (ApiGatewayWebsocketProxyRequest).
# Push messages back to the client by POSTing to /_riz/connections/{id}.
[function.chat]
protocol    = "websocket"
runtime     = "bun"
handler     = "./examples/lambdas/chat/index.handler"
timeout_ms  = 5000
concurrency = 10

[[function.chat.routes]]
path = "/chat"
method = "ANY"

[function.crud-accounts]
runtime = "bun"
handler = "./examples/lambdas/crud-accounts/index.handler"
timeout_ms = 5000
concurrency = 10

[[function.crud-accounts.routes]]
path = "/accounts/{id}"
method = "ANY"

[[function.crud-accounts.routes]]
path = "/accounts"
method = "ANY"
