[server]
port = 3000
host = "127.0.0.1"

[cache]
default_ttl_secs = 0
max_size_mb = 128

[datadog]
enabled = false

# Function-centric config matches AWS Lambda + API Gateway v2.
# One function = one process pool. One function can serve N routes,
# including AWS-style {param} captures and {proxy+} greedy wildcards.

[function.ping]
runtime = "bun"
handler = "./examples/lambdas/ping/index.ts"
timeout_ms = 1000
concurrency = 1
# No routes block → implicit default: ANY /ping

[function.accounts]
runtime = "bun"
handler = "./examples/lambdas/accounts/index.ts"
timeout_ms = 1000
concurrency = 1

[[function.accounts.routes]]
path = "/accounts/{id}"
method = "GET"

[function.events]
runtime = "bun"
handler = "./examples/lambdas/events/index.ts"
timeout_ms = 1000
concurrency = 1

[[function.events.routes]]
path = "/events"
method = "POST"

# WebSocket API. The connection upgrade happens at the route path (/chat).
# Handler receives $connect / $default / $disconnect events shaped exactly
# like AWS API Gateway WebSocket (ApiGatewayWebsocketProxyRequest).
# Push messages back to the client by POSTing to /_riz/connections/{id}.
[function.chat]
protocol    = "websocket"
runtime     = "bun"
handler     = "./examples/lambdas/chat/index.ts"
timeout_ms  = 5000
concurrency = 10

[[function.chat.routes]]
path = "/chat"
method = "ANY"
