# ─────────────────────────── Benchmark (perf floor) ─────────────────────────

[[claim]]
id = "perf-throughput"
page_text = "req/s · p99 &lt; 1ms"
status = "benchmark"
proof = "ws_handles_100_messages_within_10s"
note = "Headline 91k req/s · p99<1ms is a benches/ result (the stat bar links the recipe), not a deterministic CI test. The CI-floor sibling ws_handles_100_messages_within_10s is the regression gate that fails if load throughput collapses. The stat bar renders the number and label in separate spans (`91k</span><span>req/s…`), so the drift guard pins the markup-independent `req/s · p99 &lt; 1ms` rather than the `91k` figure, which the benches recipe substantiates."

