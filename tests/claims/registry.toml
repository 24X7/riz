# ─────────────────────────── Benchmark (perf floor) ─────────────────────────

[[claim]]
id = "perf-throughput"
page_text = "91k req/s · p99 &lt; 1ms"
status = "benchmark"
proof = "ws_handles_100_messages_within_10s"
note = "Headline 91k req/s · p99<1ms is a benches/ result (see benches/README.md recipe), not a deterministic CI test. The CI-floor sibling ws_handles_100_messages_within_10s is the regression gate that fails if load throughput collapses."

# ─────────────────────────── Copy-only (stats/marketing) ────────────────────

[[claim]]
id = "test-count"
page_text = "800+ tests"
status = "copy-only"
note = "Honest floor, not a pinned count: the absolute number from `cargo nextest list` grows every commit (827 as of 2026-06-10), so the page states a floor ('800+') that stays true without per-commit churn. The cross-runtime parity *capability* it advertises is proven separately (see cross-runtime-parity). landing_page_contract.rs::every_page_claim_is_registered checks this string is reflected here so it can't silently drift."

[[claim]]
id = "warm-pool-no-cold-start"
page_text = "Warm pre-spawned process pool per function — no per-request cold start; a spawn happens only at boot, respawn, or hot-swap"
status = "copy-only"
note = "Honest phrasing of the warm-pool behavior — NOT 'zero cold starts ever'. riz keeps one warm pre-spawned child-process pool per function (see src/process — spawn_all / wait_for_ready), so a cold start happens only at boot, respawn, or hot-swap, never per request in steady state. WASM is sub-ms even when it does spawn. The deterministic perf-floor sibling is ws_handles_100_messages_within_10s (see perf-throughput); this claim is registered copy-only because 'no per-request cold start' is a steady-state architectural property, not a single asserted number."

[[claim]]
id = "runtime-harness-production-grade"
page_text = "You write the function; the runtime brings the rest."
status = "copy-only"
note = "Positioning frame for the product thesis: riz is a runtime harness, not a framework — the author writes only business logic and the runtime supplies the always-on parts (safety profile, supervised respawn, drain, observability, hot-swap). 'Production-grade' and 'no framework decision' are subjective umbrella framings; the underlying primitives they summarize are each proven by their own claims (isolation-always-on-safety-profile, lifecycle-supervised-respawn, lifecycle-graceful-drain, lifecycle-s3-hotswap-rollback, metrics-prometheus, otlp-export)."

[[claim]]
id = "agent-flywheel"
page_text = "an agent writes a plain function, and the instant riz boots it's a callable, production-grade tool — zero glue"
status = "copy-only"
note = "The adoption-mechanism framing: an agent (or human) that writes a function instantly has a callable MCP tool with no glue. The provable mechanics under it are the MCP auto-exposure (mcp-agent-native) and agent tool-call (agent-tooluse) claims; 'production-grade' is the same umbrella framing covered by runtime-harness-production-grade. Registered copy-only because the sentence is positioning, not a single asserted behavior."

[[claim]]
id = "bug-tracker-closed"
page_text = "Production-readiness bug tracker closed, with regression-gate tests for the fixed bugs"
status = "copy-only"
note = "Softened from the unverifiable 'All 20 … each with a regression-gate test'. Only ~8 distinct BUG-NN entries are referenced in the tree and only a few have dedicated regression-gate tests (e.g. bug_01_parse_failure_respawns, bug_16_access_logs_include_correlation, bug_19_unpack_zip_skips_symlink_entries). The provable truth is that the tracker is closed with regression-gate tests for the fixed bugs."

