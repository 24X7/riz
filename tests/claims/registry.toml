# Claims registry — the single source of truth that maps each headline
# capability claim on the landing page (web/index.html) to its honest status
# and, where applicable, the REAL test that proves it.
#
# Enforced by tests/claims_truth.rs. Statuses:
#   proven      — backed by a real test fn (proof = bare fn name).
#   benchmark   — perf number; proof = the deterministic CI-floor sibling test.
#   coming-soon — roadmap ribbon; data_claim + roadmap pointer.
#   copy-only   — subjective/marketing or point-in-time stat; note required.
#
# `page_text` is a verbatim substring of the tag-stripped page text and acts as
# a drift guard: change the page wording and the matching claim must move too.

