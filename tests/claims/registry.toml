# Claims registry — the single source of truth behind the site's promise:
# "every capability sentence on this site is pinned to a passing test."
#
# Enforced by tests/claims_truth.rs across ALL of web/*.html. Statuses:
#   proven      — backed by a real test fn (proof = bare fn name).
#   benchmark   — a perf number; proof = the deterministic CI-floor sibling.
#   copy-only   — a subjective/marketing line or point-in-time stat; note required.
#
# The site itself DISPLAYS each proven capability's test-function name (the cap
# cards' "proof:" line and the detail pages' proof ledgers). So for proven
# claims `page_text` IS that displayed fn name: one string that is
# simultaneously (a) a verbatim drift-guard substring of the live page and
# (b) the test that must exist in tests/ or src/. claims_truth.rs also checks
# the reverse — every fn name shown on the site is registered here — so a
# "proof:" label can never point at a function that doesn't exist.

