# ─────────────────────────── Copy-only (stats/positioning) ──────────────────

[[claim]]
id = "test-count"
page_text = "1,300+"
status = "copy-only"
note = "A floor, not a pinned count: the absolute number from `cargo nextest list --workspace` grows every commit (1340 as of 2026-07-22), so the site states a floor ('1,300+') that stays true without per-commit churn. Appears in the home stat bar, meta/OG descriptions, the docs lede, and og-card.html. The capability it gestures at — every claim mapped to a test — is exactly what this registry + claims_truth.rs enforce."

[[claim]]
id = "no-per-request-cold-start"
page_text = "no per-request cold start"
status = "copy-only"
note = "Precise phrasing of the warm-pool behavior — NOT 'zero cold starts ever'. riz keeps one warm pre-spawned child-process pool per function, so a cold start happens only at boot, respawn, or hot-swap, never per request in steady state. The deterministic perf-floor sibling is ws_handles_100_messages_within_10s (see perf-throughput); registered copy-only because 'no per-request cold start' is a steady-state architectural property, not a single asserted number."

[[claim]]
id = "claims-as-code"
page_text = "nothing on this site outruns the suite"
status = "copy-only"
note = "The brand frame for the whole site: every capability sentence is pinned to a passing test. It is not a single behavior but the meta-property this registry + claims_truth.rs (page_text-on-site + proof-fn-exists + reverse fn-is-registered) collectively enforce."

[[claim]]
id = "single-binary-apache"
page_text = "One binary. Apache-2.0."
status = "copy-only"
note = "Positioning line in the footer/site copy. The single-binary build is the release artifact; Apache-2.0 is the LICENSE file. Registered copy-only because it is a packaging/licensing statement, not a runtime behavior with a unit test."

